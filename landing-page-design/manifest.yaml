card:
  tagline: Проектирует конвертящий лендинг — структуру, секции, копи-каркас и логику убеждения
  description: |
    Навык превращает агента в дизайнера посадочных страниц. Ты говоришь «сделай лендинг
    для моего продукта» — а на выходе получаешь готовую структуру: hero с цепляющим
    заголовком, оффер, блок выгод, социальное доказательство, «как это работает», FAQ
    и финальный CTA. Каждая секция — на своём месте по проверенной формуле конверсии.

    Внутри — рабочие правила: формула above-the-fold (что видно за 5 секунд до скролла),
    заголовки, которые продают, психология кнопок CTA, расстановка соцдоказательств,
    минимизация полей форм и мобильная вёрстка. Агент не сочиняет красивые слова —
    он собирает страницу, которая ведёт посетителя от боли к действию.

    Подходит, когда у тебя есть продукт и нужен лендинг, который не просто «выглядит»,
    а превращает трафик в заявки и подписки.
  category: Дизайн
  icon: 🎨
  bullets:
    - Готовая структура лендинга — от hero до финального CTA по порядку, который работает
    - Формула above-the-fold: что должно быть видно за 5 секунд до скролла
    - Заголовки и кнопки CTA по психологии конверсии, а не «красивые слова»
    - Расстановка соцдоказательств, минимальные формы, мобильная вёрстка
    - Копи-каркас под твой продукт — текст-черновик для каждой секции
  tags:
    - Лендинг
    - Конверсия
    - Дизайн страниц
    - Маркетинг
    - CTA
    - Копирайтинг
  price: free


card:
  tagline: Проектирует архитектуру AI-агентов и мультиагентных систем под твою задачу — роли, оркестрация, память, инструменты
  description: |
    Навык-архитектор для тех, кто строит не один промпт, а систему цифровых сотрудников.
    Когда он активен, агент не кидается писать код агента вслепую — он сначала проектирует:
    распределяет роли, выбирает паттерн оркестрации (supervisor, swarm, plan-and-execute),
    продумывает память, набор инструментов и обработку сбоев.

    Внутри — рабочие паттерны (ReAct-цикл, plan-and-execute, реестр инструментов) и карта
    острых углов: бесконечные циклы без лимитов, перегруз инструментами, «хомячья» память.
    Агент проектирует автономию, которая остаётся управляемой: знает, когда система должна
    спросить человека, а когда действовать сама, и закладывает понятные режимы отказа.

    Скажи «спроектируй систему AI-агентов под мою задачу» — и получишь продуманный дизайн
    агентной архитектуры, а не сырой набросок, который развалится на первом реальном кейсе.
  category: AI и нейросети
  icon: 🧠
  bullets:
    - Распределяет роли и выбирает паттерн оркестрации — supervisor, swarm, plan-and-execute
    - Проектирует память, набор инструментов и реестр инструментов под задачу
    - Закладывает лимиты итераций, обработку ошибок и трейсинг — без бесконечных циклов
    - Балансирует автономию и контроль: когда агент действует сам, когда спрашивает человека
    - Готовые паттерны ReAct и plan-and-execute плюс карта типичных грабель
  tags:
    - AI-агенты
    - Архитектура

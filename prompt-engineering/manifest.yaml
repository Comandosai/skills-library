    name: Claude Code
  - id: openai-codex
    name: OpenAI Codex
  - id: google-antigravity
    name: Google Antigravity

target_audience:
  - Предприниматели
  - AI-интеграторы
  - Маркетологи
  - Indie-разработчики
  - Все, кто работает с нейросетями каждый день

capabilities:
  - prompt-writing
  - prompt-debugging
  - few-shot-design
  - chain-of-thought
  - system-prompt-design
  - template-systems
  - prompt-optimization
  - output-formatting

triggers:
  ru:
    - напиши промпт чтобы нейросеть делала
    - модель тупит поправь промпт
    - почему модель выдаёт разное на один запрос
    - составь системный промпт для бота
    - сделай промпт стабильнее
    - оптимизируй мой промпт

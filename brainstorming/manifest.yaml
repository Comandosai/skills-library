  license: MIT
  curated_by: COMANDOS
  ru_localized: true
  # v0.2.0 усилен приёмами grill-me (Matt Pocock): рекомендация на каждый вопрос,
  # «есть в коде — смотри код», чекпоинт после каждого ответа, петля до отсутствия дыр
  inspired_by: https://github.com/mattpocock (grill-me)

card:
  tagline: Превращает сырую идею в готовый план — через диалог, по одному вопросу
  description: |
    Навык-мышление перед любой стройкой. Вместо того чтобы агент сразу кидался писать код
    или контент по размытому запросу, он устраивает «допрос»: задаёт вопросы по одному,
    к каждому сам предлагает рекомендованный ответ (можно просто сказать «ок»), а что
    можно узнать из кода — узнаёт сам, не дёргая тебя. Идёт по дереву решений, разрешая
    зависимости одну за другой, и не начинает строить, пока в плане не закроются все дыры.

    Каждый ответ тут же пишется в живой файл (решения + Q&A-лог + список открытых вопросов),
    так что сессию можно прервать и продолжить с того же места. Результат — валидированный
    план/спека, а не куча кода, который потом жалко выбрасывать. Безжалостно режет лишнее
    по YAGNI. Идеально, когда «хочу сделать X, но не знаю с чего начать» — фича, лендинг,
    бот или бизнес-процесс. Старт проекта на 90% понимания, а не на 70%.
  category: AI и нейросети
  icon: 💡
  bullets:
    - Один вопрос за раз и к каждому — свой рекомендованный ответ (жми «ок»)
    - Что можно узнать из кода — узнаёт сам, не дёргает лишними вопросами
    - Чекпоинтит каждый ответ в живой файл — сессию можно прервать и продолжить
    - Идёт по дереву решений и не строит, пока не закрыты все дыры
    - Режет лишнее по YAGNI и пишет финальный план в файл
  tags:
    - Мозговой штурм
    - Планирование
    - Идеи
    - Требования
    - Спецификация
    - Дизайн
  price: free


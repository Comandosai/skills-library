# Происхождение (служебное поле, в MDX не идёт — атрибуция апстрима)
source:
  collection: Superpowers (obra)
  upstream: https://github.com/obra/superpowers
  license: MIT
  curated_by: COMANDOS
  ru_localized: true

card:
  tagline: Несколько независимых задач — раздать рою агентов и решить разом, а не по очереди
  description: |
    Навык-диспетчер для случаев, когда висит сразу несколько не связанных между собой задач:
    тут баг, там отвалившийся тест, здесь отдельная подсистема. Разбирать их по очереди — терять
    время на ровном месте. Навык учит агента раздавать по одному субагенту на каждую независимую
    задачу и запускать их одновременно.

    Внутри не «запусти побольше агентов», а трезвый алгоритм. Сначала проверить, действительно ли
    задачи независимы — нет общего состояния, фикс одной не чинит другую — и только потом дробить.
    Каждому субагенту даётся узкий фокус, чёткая цель, границы («не трогай чужой код») и формат
    ответа. Когда агенты возвращаются — собрать результаты, проверить, что правки не конфликтуют,
    и прогнать всё вместе.

    Итог: то, что раньше делалось последовательно за час, закрывается параллельно за время одной
    задачи. Меньше контекста на каждого агента, меньше ошибок, выше скорость.
  category: AI и нейросети
  icon: ⚡
  bullets:
    - Один субагент на одну независимую задачу — работают одновременно
    - Сначала проверяет независимость задач, потом дробит (нет общего состояния)
    - Каждому агенту — узкий фокус, границы и чёткий формат ответа
    - Собирает результаты, ловит конфликты правок, прогоняет всё вместе
    - Экономит время: параллельно вместо «по очереди»
  tags:
    - Параллельные агенты
    - Оркестрация
    - Субагенты
    - Многозадачность
    - Автоматизация
  price: free


card:
  tagline: Собирает обоснованную схему цен и тарифов — от модели монетизации до психологии ценника
  description: |
    Навык-стратег по деньгам. Вместо того чтобы ставить цену «на глаз» или копировать
    конкурента, агент проектирует ценообразование от ценности: подбирает модель монетизации
    (подписка, разовая покупка, usage-based, revenue share), собирает тарифную сетку
    Good-Better-Best, расставляет грейды и якоря, применяет психологию ценника и продумывает
    апселлы.

    Под капотом — методики ценовых исследований (Van Westendorp, MaxDiff, Gabor-Granger),
    выбор value-метрики, упаковка под персоны, freemium vs free trial, стратегии повышения
    цен и оформление прайс-страницы. Ты говоришь «как назначить цену» или «собери тарифы» —
    получаешь схему с цифрами и обоснованием, а не догадку.

    Подходит для SaaS, инфопродуктов, сервисов и любых проектов, где надо превратить
    ценность в выручку без потери конверсии.
  category: Маркетинг
  icon: 💰
  bullets:
    - Подбирает модель монетизации под продукт — подписка, разовая, usage, revenue share
    - Собирает тарифы Good-Better-Best с грейдами, лимитами и якорями
    - Считает готовность платить через Van Westendorp, MaxDiff, Gabor-Granger
    - Применяет психологию ценника — anchoring, decoy, charm-pricing, годовые скидки
    - Продумывает апселлы, freemium vs trial и стратегию повышения цен
  tags:
    - Цены
    - Тарифы
    - Монетизация
    - Подписка
    - Прайсинг
    - Юнит-экономика
  price: free


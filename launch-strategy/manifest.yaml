# Происхождение (служебное поле, в MDX не идёт — для нашего учёта и атрибуции)
source:
  collection: Сообщество Claude Code Skills
  curated_by: COMANDOS
  ru_localized: true

card:
  tagline: Строит пошаговый план запуска продукта — до, во время и после, по фазам и каналам
  description: |
    Навык-стратег для запуска продукта или фичи. Вместо размытого «давай как-нибудь
    объявим» он собирает конкретный план: пять фаз от внутреннего теста до полного релиза,
    раскладку по каналам (свои, арендованные, заимствованные), тайминг, активности на
    каждый день и чек-листы до/во время/после.

    Ты говоришь «как запустить мой продукт» — получаешь дорожную карту с понятными шагами,
    а не общие советы. Внутри — фреймворк ORB по каналам, отдельная схема под Product Hunt,
    сценарии для лонча новой фичи и план поддержания импульса после запуска.

    Идеально, когда выкатываешь MVP, beta, waitlist или анонсируешь крупное обновление и
    нужно не упустить ни одного касания с аудиторией.
  category: Маркетинг
  icon: 🚀
  bullets:
    - Пять фаз запуска — от внутреннего теста до полного релиза
    - Раскладка по каналам ORB — свои, арендованные, заимствованные
    - Отдельный сценарий под Product Hunt с подготовкой и днём X
    - Чек-листы до / во время / после запуска
    - План поддержания импульса и регулярных анонсов
  tags:
    - Запуск
    - Go-to-market
    - Маркетинг
    - Product Hunt
    - Стратегия
    - Анонс
  price: free


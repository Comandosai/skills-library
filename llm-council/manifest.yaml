schema: comandos-skill-manifest/v1
slug: llm-council
name: "Совет LLM — взвешенные решения"
version: 0.1.0
released_at: 2026-07-12

# Происхождение (служебное поле, в MDX не идёт — для нашего учёта и атрибуции)
source:
  collection: COMANDOS Original
  upstream: https://github.com/karpathy/llm-council
  license: MIT
  curated_by: COMANDOS
  ru_localized: true
  # Не порт кода, а навык-оркестрация: идея Карпати (разные вендоры → анонимное
  # взаимное ревью → синтез председателя) переосмыслена под сабагенты Claude Code
  # с разными ролями-линзами вместо разных вендоров.
  inspired_by: https://github.com/karpathy (llm-council)

card:
  tagline: "Собирает совет из 3-4 ролей-советников Claude, которые спорят и синтезируют вердикт"
  description: |
    По мотивам LLM Council Андрея Карпати — вместо одного ответа «в лоб» навык собирает
    маленький совет из независимых сабагентов Claude, каждому из которых дан свой мандат:
    искать возможности, искать риски, считать ресурсы, слушать клиента (или свой набор
    ролей под ревью текста и техрешения). Советники отвечают параллельно и не видят друг
    друга, потом анонимно ревьюят чужие позиции и ранжируют аргументы, а в конце Claude
    в роли председателя честно показывает, где все сошлись, а где разошлись и почему —
    вместо того чтобы сгладить разногласия в один усреднённый ответ.

    Это не порт оригинала: вместо разных вендоров (GPT, Gemini, Claude, Grok) используются
    разные роли-линзы одного и того же Claude — для рабочих решений это закрывает слепые
    зоны не хуже, а иногда и лучше, чем разнообразие моделей. Честно об ограничении: это
    один интеллект в разных костюмах, а не консилиум независимых экспертов — зато без
    OpenRouter, без чужих ключей и доплат, работает на любой подписке Claude Code из коробки.

    Полезно перед важным решением, ревью оффера или статьи, выбором архитектуры — везде,
    где хочется услышать не один голос, а спор нескольких точек зрения перед тем, как решить.
  category: "AI и нейросети"
  icon: 🏛
  bullets:
    - "3-4 сабагента-советника отвечают параллельно, не видя друг друга"
    - "Готовые пресеты ролей: РЕШЕНИЕ, РЕВЬЮ ТЕКСТА, ТЕХРЕШЕНИЕ"
    - "Анонимное взаимное ревью — советники ранжируют чужие аргументы вслепую"
    - "Председатель не сглаживает разногласия, а показывает их и объясняет trade-off"
    - "Быстрый режим без взаимного ревью — когда нужен совет, а не разбор на час"
    - "Ноль внешних ключей и подписок — работает на базовом Claude Code"
    - "По мотивам LLM Council Андрея Карпати, переосмыслено под роли вместо вендоров"
  tags:
    - Принятие решений
    - Ревью
    - Мультиагентность
    - Стратегия
    - Второе мнение
    - Оркестрация
  price: free


# Происхождение (служебное поле, в MDX не идёт — для нашего учёта и атрибуции)
source:
  collection: Сообщество Claude Code Skills
  curated_by: COMANDOS
  ru_localized: true

card:
  tagline: Разбивает большую задачу на независимые под-агенты и гонит их параллельно
  description: |
    Навык-дирижёр для крупных задач. Когда работы много и она распадается на куски,
    которые не зависят друг от друга, агент перестаёт делать всё последовательно одним
    потоком — он разворачивает несколько специализированных под-агентов и запускает их
    одновременно, каждый со своей зоной ответственности.

    Скажи «проанализируй весь проект разом» или «сделай эти пять задач параллельно» — и вместо
    долгого линейного прохода получишь несколько параллельных: безопасность, бэкенд, фронтенд,
    тесты, инфраструктура смотрятся одновременно и разными «глазами». Каждый под-агент работает
    в своём контексте, а не толкается с остальными за внимание.

    На выходе агент сводит всё в один отчёт: вклад каждого под-агента, общие выводы и
    приоритизированный список действий. Быстрее на объёме и глубже за счёт нескольких точек зрения.
  category: AI и нейросети
  icon: ⚡
  bullets:
    - Сам делит крупную задачу на независимые куски и раздаёт под-агентам
    - Гонит несколько под-агентов параллельно, а не в одну линию
    - Каждый под-агент — со своей экспертизой и чистым контекстом
    - Сводит результаты в единый отчёт с приоритетами
    - Готовые паттерны: комплексный анализ, ревью фичи, аудит безопасности
  tags:
    - Параллельность
    - Оркестрация
    - Под-агенты
    - Анализ кода
    - Аудит
    - Производительность
  price: free


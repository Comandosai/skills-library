schema: comandos-skill-manifest/v1
slug: subagent-driven-development
name: Разработка через субагентов
version: 0.1.0
released_at: 2026-06-30

# Происхождение (служебное поле, в MDX не идёт — атрибуция апстрима)
source:
  collection: Superpowers (obra)
  upstream: https://github.com/obra/superpowers
  license: MIT
  curated_by: COMANDOS
  ru_localized: true

card:
  tagline: Выполняй план задачами — на каждую свежий субагент и двойная проверка (по ТЗ, затем по качеству)
  description: |
    Навык-конвейер для исполнения готового плана. Вместо того чтобы один агент тащил весь проект
    в одном замусоренном контексте, навык запускает на каждую задачу свежего субагента — с чистой
    головой и полным текстом задачи. Сделал, протестировал, закоммитил, сам себя проверил — передал
    дальше.

    Ключевая фишка — двухступенчатая проверка после каждой задачи. Сначала ревьюер сверяет результат
    с ТЗ (всё ли сделано, не добавлено ли лишнего), и только когда тут зелёный свет — второй ревьюер
    смотрит качество кода. Нашли проблему — тот же субагент чинит, ревью повторяется, пока не пройдёт.
    Никаких «и так сойдёт».

    Всё это идёт в одной сессии, без передачи человеку между задачами: ты отвечаешь на вопросы
    субагента, если он их задаёт, остальное конвейер делает сам. На выходе — реализованный план,
    где каждый кусок прошёл сверку с ТЗ и проверку качества, а не просто «вроде работает».
  category: Разработка
  icon: 🔁
  bullets:
    - На каждую задачу — свежий субагент с чистым контекстом (без мешанины)
    - Двухступенчатое ревью: сначала сверка с ТЗ, потом качество кода
    - Нашли проблему — тот же агент чинит, ревью повторяется до зелёного
    - Всё в одной сессии, без передачи человеку между задачами
    - Субагенты сами тестируют и коммитят по ходу
  tags:
    - Субагенты
    - Исполнение плана
    - Ревью кода
    - Оркестрация
    - Контроль качества
  price: free

author:
  name: COMANDOS
  github: Comandosai
  url: https://comandos.ai


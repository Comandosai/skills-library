  - subagent-orchestration
  - spec-compliance-review
  - code-quality-review
  - review-loops
triggers:
  ru:
    - выполни план через субагентов
    - реализуй план по задачам с ревью
    - запусти конвейер субагентов
    - сделай задачи с проверкой по ТЗ и качеству
    - исполни план в этой сессии

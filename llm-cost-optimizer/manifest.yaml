  ru_localized: true

card:
  tagline: Режет расходы на LLM-API в 5–10 раз — маршрутизация, кэширование, инструментация
  description: |
    Проактивный советник по оптимизации расходов на LLM API. Превращает расходы из чёрного ящика
    в управляемый инженерный процесс: вводит логирование по фичам, проектирует маршрутизацию
    запросов на дешёвые модели (80% запросов не нуждаются в топ-моделях), проводит промпт-аудит,
    дизайнит кэширование. На выходе — cost audit по фичам, scorecard оптимизации 0–100, дизайн
    архитектуры с прогнозом экономии. Для разработчиков LLM-приложений, продактов считающих TCO
    и фаундеров с бюджетом на AI.
  category: AI и нейросети
  icon: 💸
  bullets:
    - 7 техник снижения расходов: маршрутизация, кэширование, логирование, сжатие промптов
    - Классификация запросов по сложности — роутит на дешёвые модели, оставляет дорогие для reasoning
    - Cost audit по фичам, scorecard 0–100 и список приоритетных фиксов с прогнозом экономии
    - Проактивные флаги: моноулитура по модели, отсутствие max_tokens, неумолчание системного промпта
    - Таблица 7 анти-паттернов и их recovery (нет логов → первый шаг: инструментация)
  tags:
    - LLM-оптимизация
    - Расходы API
    - Маршрутизация моделей
    - Caching
    - Cost Engineering
    - Token Economy
  price: free


card:
  tagline: "Помогает агенту проходить многошаговые формы: signup, onboarding, профили, checkout-like сценарии"
  description: |
    Поддерживающий навык для browser-задач, где агент работает с формами: регистрация,
    онбординг, настройки профиля, анкеты, многошаговые заявки и checkout-like сценарии.
    Навык учит агента не собирать лишние данные заранее, обновлять DOM-снимки после каждого
    шага, не терять состояние при перерендере и честно останавливаться на sensitive-этапах.

    Особенно полезен вместе с Camofox Browser Operator: один навык даёт браузерную среду,
    второй — дисциплину прохождения форм без хаоса и выдуманных результатов.
  category: Автоматизация
  icon: 🧾
  bullets:
    - Ведёт агента по многошаговым формам без сбора лишних данных заранее
    - Обновляет browser snapshot после каждого next/submit, чтобы не кликать stale refs
    - Останавливается на паролях, SMS/email-кодах, CAPTCHA, оплате и юридических согласиях
    - Обрабатывает provider anti-abuse и не зацикливается на повторных signup-попытках
    - Даёт короткие, понятные статусы человеку во время формы
  tags:
    - Hermes
    - Browser forms
    - Signup
    - Onboarding
    - Web automation
    - Human-in-the-loop

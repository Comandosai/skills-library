  ru_localized: true

card:
  tagline: Пишет SEO-контент в едином tone of voice — посты, статьи, контент-план
  description: |
    Навык превращает агента в твоего контент-мейкера, который держит единый голос
    бренда во всём, что пишет: блог-посты, соцсети, рассылки, контент-план. Сначала
    он разбирает твой стиль — формальность, тон, структуру фраз — и дальше пишет так,
    будто это писал ты сам, а не нейросеть.

    Внутри — анализатор бренд-голоса, SEO-оптимизатор, библиотека фреймворков под
    каждый тип контента и шаблоны для соцсетей. Ты говоришь «сделай контент-план на
    месяц» или «напиши пять постов в моём стиле» — получаешь готовые материалы под
    конкретные каналы, с проверенной плотностью ключей и правильной структурой.

    Подходит, когда контента нужно много и регулярно, а голос должен оставаться
    своим — без разнобоя, воды и канцелярита.
  category: Контент
  icon: 📝
  bullets:
    - Анализирует твой стиль и пишет в едином tone of voice
    - SEO под капотом — плотность ключей, заголовки, мета
    - Фреймворки под каждый тип: блог, соцсети, рассылка
    - Контент-план на месяц с распределением по каналам
    - Репёрпосинг — одна идея раскладывается под все площадки
  tags:
    - Контент
    - SEO
    - Соцсети
    - Контент-план
    - Бренд-голос
    - Копирайтинг
  price: free


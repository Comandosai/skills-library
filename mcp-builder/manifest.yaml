card:
  tagline: Строит MCP-серверы — мостики, через которые ИИ дёргает твой CRM, API и любые внешние сервисы
  description: |
    MCP (Model Context Protocol) — открытый стандарт, по которому ИИ-агент подключается к
    внешнему миру: твоей CRM, базе, платёжке, любому сервису с API. MCP-сервер — это и есть
    такой мостик. Один раз построил — и его понимают сразу несколько клиентов: Claude, Cursor,
    Codex, Gemini.

    Навык включает в агенте режим инженера интеграций. Ты говоришь «подключи агента к моему
    CRM» или «сделай интеграцию с сервисом Z» — а он сам исследует API, проектирует набор
    инструментов, пишет рабочий сервер на Python (FastMCP) или Node/TypeScript (MCP SDK),
    собирает, прогоняет через MCP Inspector и докручивает на наборе проверок.

    Внутри — методология от Anthropic: как называть инструменты, как отдавать данные
    (JSON или Markdown), как делать пагинацию, понятные ошибки и аннотации безопасности.
    Не просто «накидать код», а собрать интеграцию, которой агент реально сможет пользоваться.
  category: Разработка
  icon: 🔌
  bullets:
    - Подключает ИИ к твоему CRM, API и любому внешнему сервису через MCP
    - Пишет сервер на Python (FastMCP) или Node/TypeScript (MCP SDK)
    - Один сервер — много клиентов: Claude, Cursor, Codex, Gemini
    - Проектирует инструменты по гайдлайнам Anthropic, а не наугад
    - Собирает, тестирует через MCP Inspector и проверяет на наборе сценариев
  tags:
    - MCP
    - Интеграции
    - API
    - Python
    - TypeScript
    - Автоматизация
  price: free


card:
  tagline: Скажи «сделай бота, который делает X» — получи рабочего Telegram-бота
  description: |
    Навык превращает агента в опытного архитектора Telegram-ботов. Ты описываешь
    словами, что бот должен уметь, — а агент проектирует и собирает его целиком:
    команды и меню, кнопки и инлайн-клавиатуры, состояния диалога, вебхуки,
    интеграции с внешними API и базой, а потом разворачивает на сервере.

    Под капотом — знание всей экосистемы Telegram Bot API: какие библиотеки брать
    под задачу (telegraf, grammY, aiogram), как сделать так, чтобы бот не «висел»
    и не спамил, как принимать платежи и считать аналитику. Агент сам выбирает стек,
    раскладывает проект по папкам и закрывает типичные грабли — таймауты, отсутствие
    обработки ошибок, блокировки пользователями.

    Особенно полезно для тех, кто живёт в Telegram: боты для канала, поддержки,
    приёма заявок, авто-ответов, мини-CRM, доступа к закрытому контенту по подписке.
  category: Разработка
  icon: 🤖
  bullets:
    - Описываешь словами — агент собирает бота целиком, от команд до деплоя
    - Сам подбирает стек под задачу (telegraf, grammY, aiogram) и раскладывает проект
    - Меню, инлайн-кнопки, пагинация, состояния диалога — из коробки
    - Вебхуки, интеграции с API и базой, приём платежей и аналитика
    - Закрывает грабли — таймауты, ошибки, спам, блокировки
  tags:
    - Telegram
    - Боты
    - Webhook
    - Интеграции
    - Автоматизация
    - Деплой
  price: free


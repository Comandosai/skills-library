card:
  tagline: Справочник-настройка, чтобы выжимать из Claude Code максимум — конфиги, «Thinking»-режимы, отладка
  description: |
    Это не навык «сделай за меня», а навык «настрой и подскажи правильно». Он даёт агенту
    и тебе единую базу знаний по самому Claude Code: как составить грамотный CLAUDE.md,
    какими словами включать режимы глубокого мышления, как выводить агента из ступора
    и какие приёмы экономят контекст и время.

    Под капотом — шаблоны конфигов, словарь «Thinking»-ключей, чек-лист отладки и набор
    лучших практик. Включаешь — и Claude Code начинает работать по уму: меньше промахов,
    меньше переделок, больше дела с первого захода.

    Идеально, когда ты только осваиваешь Claude Code или хочешь перестать воевать с
    агентом и начать получать предсказуемый результат — даже если ты не глубокий технарь.
  category: AI и нейросети
  icon: 📘
  bullets:
    - Готовый шаблон CLAUDE.md — агент сразу знает правила твоего проекта
    - Словарь «Thinking»-ключей, которые включают глубокое рассуждение
    - Чек-лист отладки, когда агент застрял или делает не то
    - Приёмы экономии контекста — меньше промахов, меньше переделок
    - Лучшие практики итеративной работы с агентом
  tags:

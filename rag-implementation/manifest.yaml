  ru_localized: true

card:
  tagline: Собирает бота и поиск, которые отвечают по твоим документам — а не выдумывают
  description: |
    Навык превращает агента в инженера RAG (Retrieval-Augmented Generation). Ты говоришь
    «сделай бота, который отвечает по моим документам / базе знаний» — и получаешь не очередную
    болталку, которая фантазирует, а систему, где каждый ответ опирается на твои реальные данные:
    регламенты, статьи, переписку, базу продукта.

    Под капотом агент проходит весь путь: грамотно нарезает документы на смысловые куски (chunking),
    считает эмбеддинги, складывает их в векторную базу и настраивает поиск — гибридный (вектор +
    ключевые слова) с переранжированием, чтобы в контекст модели попадало именно то, что нужно.
    Код фреймворк-агностичен: подойдёт под твой стек и любую векторную БД.

    Ровно так у нас устроен бот-консьерж COMANDOS — отвечает по базе курса, а не сочиняет.
    Этот навык даёт тебе тот же подход для своего проекта.
  category: AI и нейросети
  icon: 📚
  bullets:
    - Отвечает строго по твоим данным — фактами из документов, а не выдумками
    - Умная нарезка по смыслу (chunking), а не «порезали по 500 символов»
    - Гибридный поиск (вектор + ключевые слова) с переранжированием релевантности
    - Подсказывает, когда RAG реально нужен, а когда это лишняя сложность
    - Фреймворк-агностичный код — под твой стек и любую векторную базу
  tags:
    - RAG
    - Эмбеддинги
    - Векторный поиск
    - База знаний
    - Чат-бот
    - Семантический поиск

  - content-summarization
  - transcription
  - frame-extraction
  - scene-detection
  - research-automation
triggers:
  ru:
    - посмотри это видео
    - сделай конспект ролика
    - разбери видео конкурента
    - вытяни ключевые кадры из видео
    - создай конспект с тайм-кодами
    - помоги проанализировать вебинар
    - выжми суть из видео
    - смотри видео и делай выводы

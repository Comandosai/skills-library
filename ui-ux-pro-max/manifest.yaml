card:
  tagline: Агент проектирует и ревьюит интерфейсы как UI/UX-профи — стиль, палитра, шрифты, отступы, доступность
  description: |
    База дизайн-интеллекта прямо в агенте: 50 стилей, 21 цветовая палитра, 50 шрифтовых
    пар, 20 типов графиков и гайдлайны под 9 стеков (React, Next.js, Vue, Svelte, SwiftUI,
    React Native, Flutter, Tailwind, shadcn/ui). Когда навык активен, агент не выдаёт
    «дефолт от нейросети», а сначала подбирает целостную дизайн-систему под твой продукт
    и индустрию — стиль, палитру, типографику, эффекты — и уже на ней строит интерфейс.

    Работает в обе стороны: «сделай дашборд» — получаешь продуманный современный экран;
    «почини и улучши UI» — получаешь ревью по чек-листу (контраст, фокус-стейты, тач-таргеты,
    отступы, hover-состояния, светлая/тёмная тема, адаптив). Под капотом — поисковая база с
    приоритетами и анти-паттернами: что делать и чего избегать, чтобы интерфейс выглядел
    профессионально, а не «на коленке».

    Идеально, когда нужно быстро поднять качество фронтенда: лендинг, SaaS-дашборд,
    админка, e-commerce, портфолио или мобильное приложение — под нужный стек и без
    типовых ошибок верстальщика-нейросети.
  category: Дизайн
  icon: 🖌️
  bullets:
    - Целая дизайн-система под продукт — стиль, палитра, шрифты, эффекты, а не случайный набор
    - 50 стилей, 21 палитра, 50 шрифтовых пар, 20 графиков под 9 стеков
    - Ревью UI по чек-листу — контраст, фокус, тач-таргеты, отступы, тёмная тема
    - Анти-паттерны на борту — подсказывает, чего избегать, чтобы не было «дефолта от ИИ»
    - Доступность и адаптив из коробки — 375/768/1024/1440, a11y, prefers-reduced-motion
  tags:
